<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" fill="none" stroke="#4A5A4D" stroke-width="1" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.08em">
  <rect x="20" y="20" width="760" height="460" stroke-dasharray="4 4" />
  <!-- outdoor kitchen with pergola -->
  <rect x="180" y="120" width="440" height="260" />
  <!-- pergola posts (4 corners + 2 mid) -->
  <circle cx="180" cy="120" r="5" fill="#4A5A4D" />
  <circle cx="620" cy="120" r="5" fill="#4A5A4D" />
  <circle cx="180" cy="380" r="5" fill="#4A5A4D" />
  <circle cx="620" cy="380" r="5" fill="#4A5A4D" />
  <circle cx="400" cy="120" r="5" fill="#4A5A4D" />
  <circle cx="400" cy="380" r="5" fill="#4A5A4D" />
  <!-- beams (overhead, dashed) -->
  <line x1="180" y1="160" x2="620" y2="160" stroke-dasharray="3 3" />
  <line x1="180" y1="220" x2="620" y2="220" stroke-dasharray="3 3" />
  <line x1="180" y1="280" x2="620" y2="280" stroke-dasharray="3 3" />
  <line x1="180" y1="340" x2="620" y2="340" stroke-dasharray="3 3" />
  <!-- kitchen counter along top -->
  <rect x="210" y="140" width="380" height="50" />
  <line x1="280" y1="140" x2="280" y2="190" />
  <line x1="360" y1="140" x2="360" y2="190" />
  <line x1="440" y1="140" x2="440" y2="190" />
  <line x1="520" y1="140" x2="520" y2="190" />
  <text x="245" y="170" fill="#4A5A4D" text-anchor="middle">GRILL</text>
  <text x="320" y="170" fill="#4A5A4D" text-anchor="middle">PREP</text>
  <text x="400" y="170" fill="#4A5A4D" text-anchor="middle">SINK</text>
  <text x="480" y="170" fill="#4A5A4D" text-anchor="middle">REF</text>
  <text x="555" y="170" fill="#4A5A4D" text-anchor="middle">BAR</text>
  <!-- dining table -->
  <rect x="260" y="240" width="120" height="90" />
  <line x1="275" y1="250" x2="275" y2="320" />
  <line x1="365" y1="250" x2="365" y2="320" />
  <text x="320" y="290" fill="#4A5A4D" text-anchor="middle">DINE 8</text>
  <!-- lounge area -->
  <circle cx="520" cy="285" r="45" />
  <circle cx="520" cy="285" r="22" />
  <text x="520" y="288" fill="#4A5A4D" text-anchor="middle">FIRE</text>
  <!-- dimensions -->
  <g stroke="#4A5A4D">
    <line x1="180" y1="420" x2="620" y2="420" />
    <line x1="180" y1="415" x2="180" y2="425" />
    <line x1="620" y1="415" x2="620" y2="425" />
    <text x="400" y="438" fill="#4A5A4D" text-anchor="middle" stroke="none">44'-0"</text>
  </g>
  <text x="40" y="60" fill="#4A5A4D">OUTDOOR KITCHEN PLAN</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" fill="none" stroke="#4A5A4D" stroke-width="1" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.08em">
  <!-- property boundary -->
  <rect x="20" y="20" width="760" height="460" stroke-dasharray="4 4" />
  <!-- house footprint -->
  <path d="M 220 120 L 580 120 L 580 270 L 520 270 L 520 230 L 460 230 L 460 270 L 220 270 Z" />
  <text x="400" y="200" fill="#4A5A4D" text-anchor="middle">HOUSE</text>
  <!-- patio -->
  <rect x="260" y="280" width="260" height="90" />
  <line x1="260" y1="300" x2="520" y2="300" />
  <line x1="260" y1="320" x2="520" y2="320" />
  <line x1="260" y1="340" x2="520" y2="340" />
  <line x1="300" y1="280" x2="300" y2="370" />
  <line x1="360" y1="280" x2="360" y2="370" />
  <line x1="420" y1="280" x2="420" y2="370" />
  <line x1="480" y1="280" x2="480" y2="370" />
  <text x="390" y="328" fill="#4A5A4D" text-anchor="middle">PATIO</text>
  <!-- lawn -->
  <text x="115" y="410" fill="#4A5A4D">LAWN</text>
  <!-- beds -->
  <path d="M 40 90 Q 120 70, 200 100 Q 200 280, 40 260 Z" />
  <circle cx="80" cy="130" r="10" />
  <circle cx="120" cy="170" r="12" />
  <circle cx="70" cy="210" r="8" />
  <text x="110" y="100" fill="#4A5A4D">BED</text>
  <!-- firepit -->
  <circle cx="390" cy="420" r="24" />
  <text x="410" y="435" fill="#4A5A4D">FIREPIT</text>
  <!-- walkway -->
  <path d="M 400 370 L 400 395 M 400 445 L 400 470" stroke-dasharray="6 4" />
  <!-- trees -->
  <circle cx="650" cy="80" r="16" />
  <circle cx="720" cy="110" r="14" />
  <circle cx="680" cy="400" r="18" />
  <circle cx="740" cy="360" r="12" />
  <circle cx="90" cy="350" r="14" />
  <!-- driveway -->
  <path d="M 560 20 L 560 120 M 720 20 L 720 120" />
  <text x="640" y="70" fill="#4A5A4D" text-anchor="middle">DRIVE</text>
  <!-- north arrow -->
  <g transform="translate(730, 450)">
    <circle r="16" />
    <path d="M 0 -10 L -5 8 L 0 4 L 5 8 Z" fill="#4A5A4D" stroke="none" />
    <text y="-22" fill="#4A5A4D" text-anchor="middle">N</text>
  </g>
  <!-- scale bar -->
  <g transform="translate(40, 460)">
    <line x1="0" y1="0" x2="80" y2="0" />
    <line x1="0" y1="-4" x2="0" y2="4" />
    <line x1="80" y1="-4" x2="80" y2="4" />
    <text x="40" y="16" fill="#4A5A4D" text-anchor="middle">0    20'</text>
  </g>
</svg>

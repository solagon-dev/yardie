<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" fill="none" stroke="#4A5A4D" stroke-width="1" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.08em">
  <rect x="20" y="20" width="760" height="460" stroke-dasharray="4 4" />
  <!-- curved walkway -->
  <path d="M 80 450 Q 300 300, 500 350 T 750 200" />
  <path d="M 80 430 Q 300 280, 500 330 T 750 180" />
  <!-- paver pattern dashes -->
  <path d="M 120 440 L 125 420 M 180 420 L 185 400 M 250 390 L 255 370 M 320 360 L 325 340 M 390 340 L 395 320 M 460 335 L 465 315 M 530 340 L 535 320 M 600 320 L 605 300 M 670 270 L 675 250 M 720 230 L 725 210" />
  <!-- beds along walkway -->
  <path d="M 60 470 Q 150 420, 250 420" />
  <circle cx="90" cy="445" r="6" />
  <circle cx="130" cy="430" r="8" />
  <circle cx="200" cy="425" r="6" />
  <path d="M 500 380 Q 600 360, 700 310" />
  <circle cx="530" cy="370" r="6" />
  <circle cx="580" cy="365" r="8" />
  <circle cx="640" cy="340" r="6" />
  <!-- trees -->
  <circle cx="200" cy="200" r="24" />
  <circle cx="600" cy="150" r="20" />
  <circle cx="400" cy="120" r="18" />
  <!-- labels -->
  <text x="120" y="390" fill="#4A5A4D">STONE WALK</text>
  <text x="420" y="90" fill="#4A5A4D">CANOPY</text>
  <!-- section cut marker -->
  <g transform="translate(400, 350)">
    <line x1="-14" y1="0" x2="14" y2="0" stroke-width="1.5" />
    <circle r="8" fill="#F5F0E6" />
    <text y="4" text-anchor="middle" fill="#4A5A4D" stroke="none">A</text>
  </g>
  <text x="40" y="60" fill="#4A5A4D">WALKWAY PLAN</text>
</svg>

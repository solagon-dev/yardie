<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" fill="none" stroke="#4A5A4D" stroke-width="1" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.08em">
  <rect x="20" y="20" width="760" height="460" stroke-dasharray="4 4" />
  <!-- front elevation sketch -->
  <!-- ground line -->
  <line x1="40" y1="400" x2="760" y2="400" stroke-width="1.2" />
  <!-- house facade -->
  <path d="M 200 400 L 200 250 L 320 180 L 440 180 L 440 400" />
  <path d="M 440 400 L 440 230 L 560 230 L 560 400" />
  <!-- roof line -->
  <line x1="180" y1="260" x2="460" y2="260" />
  <!-- windows -->
  <rect x="230" y="290" width="50" height="70" />
  <line x1="255" y1="290" x2="255" y2="360" />
  <rect x="320" y="290" width="50" height="70" />
  <line x1="345" y1="290" x2="345" y2="360" />
  <rect x="470" y="260" width="40" height="60" />
  <!-- door -->
  <rect x="380" y="310" width="30" height="90" />
  <circle cx="403" cy="355" r="1.5" fill="#4A5A4D" />
  <!-- steps -->
  <line x1="360" y1="400" x2="430" y2="400" />
  <line x1="360" y1="410" x2="430" y2="410" />
  <line x1="350" y1="420" x2="440" y2="420" />
  <!-- planting along base -->
  <path d="M 80 400 Q 110 380, 140 400" />

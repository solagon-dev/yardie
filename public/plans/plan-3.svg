  <path d="M 100 400 V 320" />
  <circle cx="100" cy="300" r="30" />
  <!-- dimension -->
  <g stroke="#4A5A4D">
    <line x1="200" y1="440" x2="560" y2="440" />
    <line x1="200" y1="435" x2="200" y2="445" />
    <line x1="560" y1="435" x2="560" y2="445" />
    <text x="380" y="458" fill="#4A5A4D" text-anchor="middle" stroke="none">60'-0"</text>
  </g>
  <text x="40" y="60" fill="#4A5A4D">FRONT ELEVATION · 1/4"=1'-0"</text>
</svg>

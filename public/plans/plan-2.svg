<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" fill="none" stroke="#4A5A4D" stroke-width="1" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.08em">
  <rect x="20" y="20" width="760" height="460" stroke-dasharray="4 4" />
  <!-- L-shape house -->
  <path d="M 150 80 L 500 80 L 500 180 L 600 180 L 600 320 L 150 320 Z" />
  <text x="340" y="210" fill="#4A5A4D" text-anchor="middle">HOUSE</text>
  <!-- pool -->
  <rect x="250" y="350" width="200" height="80" rx="2" />
  <line x1="270" y1="350" x2="270" y2="430" />
  <line x1="430" y1="350" x2="430" y2="430" />
  <text x="350" y="395" fill="#4A5A4D" text-anchor="middle">POOL</text>
  <!-- pool deck -->
  <rect x="230" y="330" width="240" height="120" />
  <!-- cabana -->
  <rect x="490" y="350" width="100" height="80" />
  <text x="540" y="395" fill="#4A5A4D" text-anchor="middle">CABANA</text>
  <!-- garden beds -->
  <path d="M 40 40 Q 120 50, 140 90 Q 80 130, 40 110 Z" />
  <circle cx="70" cy="70" r="6" />
  <circle cx="100" cy="90" r="8" />
  <path d="M 620 40 Q 720 50, 770 80 Q 760 140, 680 120 Z" />
  <circle cx="700" cy="80" r="10" />
  <circle cx="740" cy="60" r="6" />
  <!-- lawn -->
  <text x="100" y="265" fill="#4A5A4D">LAWN</text>
  <!-- trees -->
  <circle cx="60" cy="240" r="18" />
  <circle cx="50" cy="380" r="14" />
  <circle cx="720" cy="270" r="16" />
  <circle cx="680" cy="420" r="12" />
  <!-- walkway -->
  <path d="M 325 320 L 325 330" stroke-dasharray="6 4" />
  <path d="M 150 170 L 40 170" stroke-dasharray="6 4" />
  <!-- north -->
  <g transform="translate(730, 50)">
    <circle r="14" />
    <path d="M 0 -8 L -4 6 L 0 3 L 4 6 Z" fill="#4A5A4D" stroke="none" />
    <text y="-20" fill="#4A5A4D" text-anchor="middle">N</text>
  </g>
  <text x="250" y="475" fill="#4A5A4D">POOL COURTYARD · SITE PLAN</text>
</svg>
